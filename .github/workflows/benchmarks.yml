# DiskANN Benchmarks Workflow
#
# This workflow runs macro benchmarks comparing the current branch against a baseline.
# It is manually triggered and requires a baseline reference (branch, tag, or commit).

name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'A branch, commit SHA, or tag name to compare the current branch with'
        required: true
        default: 'main'
        type: string
  pull_request:
    branches:
      - main
    paths:
      - 'diskann/**'
      - 'diskann-disk/**'
      - 'diskann-linalg/**'
      - 'diskann-providers/**'
      - 'diskann-quantization/**'
      - 'diskann-vector/**'
      - 'diskann-wide/**'
      - 'diskann-utils/**'
      - 'diskann-platform/**'
      - 'diskann-label-filter/**'
      - 'diskann-benchmark/**'
      - 'diskann-benchmark-runner/**'
      - '.github/workflows/benchmarks.yml'

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write  # Required for posting PR comments

jobs:
  # Macro benchmark: compare current branch against baseline
  macro-benchmark:
    name: Macro Benchmark - ${{ matrix.dataset }}
    runs-on: ubuntu-latest
    # TODO: For production benchmarks, consider using a self-hosted runner with:
    # - NVMe storage for consistent I/O performance
    # - CPU pinning (taskset) for reduced variance
    # - Dedicated hardware to avoid noisy neighbor effects
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - dataset: wikipedia-100K
            config: wikipedia-100K-disk-index.json
            archive: wikipedia-100K.tar.gz
            data_dir: wikipedia_cohere
          - dataset: openai-100K
            config: openai-100K-disk-index.json
            archive: openai-100K.tar.gz
            data_dir: OpenAIArXiv

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          path: diskann_rust
          lfs: true

      - name: Checkout baseline (${{ inputs.baseline_ref || 'main' }})
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseline_ref || 'main' }}
          path: baseline
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies (current)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: diskann_rust -> target
          key: benchmark-current

      - name: Cache Rust dependencies (baseline)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: baseline -> target
          key: benchmark-baseline

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl libssl-dev pkg-config

      # Download pre-packaged dataset from GitHub Release
      # Source: https://github.com/harsha-simhadri/big-ann-benchmarks
      - name: Download ${{ matrix.dataset }} dataset
        run: |
          mkdir -p diskann_rust/target/tmp baseline/target/tmp
          curl -L -o ${{ matrix.archive }} https://github.com/harsha-simhadri/big-ann-benchmarks/releases/download/v0.4.0/${{ matrix.archive }}
          tar xzf ${{ matrix.archive }} -C diskann_rust/target/tmp/
          cp -r diskann_rust/target/tmp/${{ matrix.data_dir }} baseline/target/tmp/

      - name: Run baseline benchmark
        working-directory: baseline
        run: |
          cargo run -p diskann-benchmark --features disk-index --release -- \
            run --input-file ../diskann_rust/diskann-benchmark/perf_test_inputs/${{ matrix.config }} \
            --output-file target/tmp/${{ matrix.dataset }}_benchmark_crate_baseline.json

      - name: Run current branch benchmark
        working-directory: diskann_rust
        run: |
          cargo run -p diskann-benchmark --features disk-index --release -- \
            run --input-file diskann-benchmark/perf_test_inputs/${{ matrix.config }} \
            --output-file target/tmp/${{ matrix.dataset }}_benchmark_crate_target.json

      - name: Validate benchmark results
        working-directory: diskann_rust
        run: |
          cargo run -p diskann-benchmark --features disk-index --release -- \
            check run \
            --tolerances diskann-benchmark/perf_test_inputs/disk-index-tolerances.json \
            --input-file diskann-benchmark/perf_test_inputs/${{ matrix.config }} \
            --before ../baseline/target/tmp/${{ matrix.dataset }}_benchmark_crate_baseline.json \
            --after target/tmp/${{ matrix.dataset }}_benchmark_crate_target.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if validation fails
        with:
          name: benchmark-results-${{ matrix.dataset }}
          path: |
            diskann_rust/target/tmp/${{ matrix.dataset }}_benchmark_crate_target.json
            baseline/target/tmp/${{ matrix.dataset }}_benchmark_crate_baseline.json
          retention-days: 30