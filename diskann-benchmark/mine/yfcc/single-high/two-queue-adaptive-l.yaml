{
    "search_directories": [
      "/ssd1/data/yfcc"
    ],
    "jobs": [
      {
        "type": "graph-index-build",
        "content": {
          "source": {
            "index-source": "Load",
            "data_type": "uint8",
            "distance": "squared_l2",
            "load_path": "/ssd1/data/yfcc/graph_10M"
          },
          "search_phase": {
            "search-type": "topk-adaptive-l-filter",
            "queries": "single-high/single_high_query_10k.u8bin",
            "groundtruth": "single-high/GT_single_high_query_10k.rangeres.bin",
            "query_predicates": "single-high/single_high_query_10k.label.jsonl",
            "data_labels": "base.10M.label.jsonl",
            "reps": 5,
            "num_threads": [
              32
            ],
            "runs": [
              {
                "search_n": 20,
                "search_l": [
                  20,
                  30,
                  40,
                  50,
                  100,
                  200,
                  500
                ],
                "recall_k": 10
              }
            ]
          }
        }
      }
    ]
  }
