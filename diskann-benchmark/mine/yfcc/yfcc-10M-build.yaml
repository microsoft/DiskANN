{
    "search_directories": [
      "/ssd1/data/yfcc"
    ],
    "jobs": [
      {
        "type": "graph-index-build",
        "content": {
          "source": {
            "index-source": "Build",
            "data_type": "uint8",
            "data": "base.10M.u8bin",
            "distance": "squared_l2",
            "max_degree": 64,
            "l_build": 100,
            "alpha": 1.2,
            "backedge_ratio": 1.0,
            "num_threads": 32,
            "num_start_points": 1,
            "num_insert_attempts": 1,
            "saturate_inserts": false,
            "start_point_strategy": "medoid",
            "save_path": "/ssd1/data/yfcc/graph_10M"
          },
          "search_phase": {
            "search-type": "topk-multihop-filter",
            "queries": "single-medium/single_medium_query_10k.u8bin",
            "groundtruth": "single-medium/GT_single_medium_query_10k.bin",
            "query_predicates": "single-medium/single_medium_query_10k.label.jsonl",
            "data_labels": "base.10M.label.jsonl",
            "reps": 5,
            "num_threads": [
              32
            ],
            "runs": [
              {
                "search_n": 20,
                "search_l": [
                  20,
                  30,
                  40,
                  50,
                  100,
                  200
                ],
                "recall_k": 10
              }
            ]
          }
        }
      }
    ]
  }
