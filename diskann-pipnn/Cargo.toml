[package]
name = "diskann-pipnn"
version.workspace = true
description = "PiPNN (Pick-in-Partitions Nearest Neighbors) index builder for DiskANN"
authors.workspace = true
documentation.workspace = true
license.workspace = true
edition = "2021"

[dependencies]
diskann = { workspace = true }
diskann-vector = { workspace = true }
diskann-utils = { workspace = true, default-features = false, features = ["rayon"] }
rayon = { workspace = true }
rand = { workspace = true }
rand_distr = { workspace = true }
bytemuck = { workspace = true, features = ["must_cast"] }
num-traits = { workspace = true }
diskann-linalg = { workspace = true }
half = { workspace = true }
diskann-quantization = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }
parking_lot = "0.12"

[dev-dependencies]
criterion = { workspace = true }
rand = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "pipnn_bench"
harness = false
