# ── Scenarios ──────────────────────────────────────────────────────────────

# --- Enron FP: Vamana vs PiPNN (fine-tuned) ---

[[scenario]]
name = "vamana_enron_fp"
dataset = "enron-fp16"
num_of_pq_chunks = 192
build_ram_limit = 16.0
use_opq = false
beam_width = 4
search_list = [2000]
r_max_degree = 64
l_build = 64
fail_if_recall_below = 93
recall_at = 1000
thread_build = 16
thread_search = 16
is_flat_search = false
quantization_type = "FP"
distance = "CosineNormalized"
[scenario.build_algorithm]
algorithm = "Vamana"

[[scenario]]
name = "pipnn_enron_fp_prune"
dataset = "enron-fp16"
num_of_pq_chunks = 192
build_ram_limit = 16.0
use_opq = false
beam_width = 4
search_list = [2000]
r_max_degree = 64
l_build = 64
fail_if_recall_below = 88
recall_at = 1000
thread_build = 16
thread_search = 16
is_flat_search = false
quantization_type = "FP"
distance = "CosineNormalized"
[scenario.build_algorithm]
algorithm = "PiPNN"
c_max = 512
c_min = 128
p_samp = 0.001
fanout = [8, 3]
leaf_k = 2
replicas = 1
l_max = 128
num_hash_planes = 14
final_prune = true

